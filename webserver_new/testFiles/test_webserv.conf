server {
	listen 4343;
	root testFiles/wwwtest1;

	host 127.0.0.1;
	client_max_body_size 10000000;

	location / {
		index test.php;
		cgi_pass .php /usr/bin/php-cgi;
		allowed_methods GET POST;
	}

	location /upload
	{
		upload_store testFiles/wwwtest1/uploads;
		allowed_methods GET POST;
		autoindex on;
	}

	location /test/ {
		return 301 /;
	}
}