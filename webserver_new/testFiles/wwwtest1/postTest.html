<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv POST Tester</title>
    <style>
        /* Basic styling for a clean look */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        
        /* Container styling */
        .container {
            background-color: white;
            border-radius: 8px;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }

        h1, h2 {
            color: #2c3e50;
            margin-top: 0;
            border-bottom: 2px solid #eee;
            padding-bottom: 10px;
        }

        /* Form element styling */
        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input[type="text"],
        input[type="email"],
        textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box; /* Ensures padding doesn't affect total width */
            font-family: inherit;
        }
        
        textarea {
            resize: vertical;
            min-height: 100px;
        }

        /* Button styling */
        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #2980b9;
        }
        
        .note {
            background-color: #e8f4fd;
            border-left: 4px solid #3498db;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Standard POST Form (application/x-www-form-urlencoded)</h2>
        <div class="note">
            This form sends data as key-value pairs. Change the <code>action</code> attribute to match the route you want to test in your webserv.
        </div>
        
        <!-- Replace action="/test-post" with your target URL -->
        <form action="/test-post" method="POST">
            <div class="form-group">
                <label for="firstName">First Name:</label>
                <input type="text" id="firstName" name="firstName" required>
            </div>
            
            <div class="form-group">
                <label for="lastName">Last Name:</label>
                <input type="text" id="lastName" name="lastName" required>
            </div>
            
            <div class="form-group">
                <label for="message">Message:</label>
                <textarea id="message" name="message"></textarea>
            </div>
            
            <button type="submit">Submit Standard Data</button>
        </form>
    </div>

    <script>
        // A simple script to allow you to easily change the target URL 
        // without editing the HTML file every time.
        
        window.addEventListener('DOMContentLoaded', () => {
            const forms = document.querySelectorAll('form');
            
            forms.forEach((form, index) => {
                const actionContainer = document.createElement('div');
                actionContainer.style.marginBottom = '15px';
                actionContainer.style.padding = '10px';
                actionContainer.style.backgroundColor = '#f9f9f9';
                actionContainer.style.border = '1px solid #ddd';
                actionContainer.style.borderRadius = '4px';
                
                actionContainer.innerHTML = `
                    <label style="display:inline; margin-right: 10px; font-weight:normal; font-size: 0.9em;">
                        Target URL for this form:
                    </label>
                    <input type="text" value="${form.action}" 
                           style="width: 60%; padding: 5px;" 
                           onchange="this.parentElement.nextElementSibling.action = this.value">
                `;
                
                // Insert the URL editor right before the form
                form.parentNode.insertBefore(actionContainer, form);
                
                // Prevent default submission to see what happens in console (optional)
                // Remove or comment out these lines if you want the browser to actually navigate
                /*
                form.addEventListener('submit', (e) => {
                    console.log(`Submitting form ${index + 1} to:`, form.action);
                    // e.preventDefault(); // Uncomment to stop actual submission
                });
                */
            });
        });
    </script>
</body>
</html>
