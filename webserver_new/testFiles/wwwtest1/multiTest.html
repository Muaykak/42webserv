<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Webserv Multipart Tester</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .code-block { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="min-h-screen p-8 text-gray-800">

    <div class="max-w-4xl mx-auto space-y-8">
        
        <header class="text-center">
            <h1 class="text-3xl font-bold text-blue-600">Webserv multipart/form-data Tester</h1>
            <p class="text-gray-500 mt-2">Use this to test your C++98 file upload parser.</p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white p-6 rounded-xl shadow-md border border-gray-200">
                <h2 class="text-xl font-semibold mb-4 border-b pb-2">Upload Form</h2>
                
                <!-- NOTE: The 'action' attribute should point to the route handled by your webserv -->
                <!-- The 'enctype' is crucial for multipart uploads -->
                <form id="uploadForm" action="/upload" method="POST" enctype="multipart/form-data" class="space-y-4">
                    
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Standard Text Field</label>
                        <input type="text" name="username" placeholder="e.g., norminette_lover" 
                               class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Select File 1</label>
                        <input type="file" name="file1" 
                               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    </div>

                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Select File 2 (Optional)</label>
                        <input type="file" name="file2" 
                               class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-semibold file:bg-green-50 file:text-green-700 hover:file:bg-green-100">
                    </div>

                    <button type="submit" 
                            class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200 mt-4">
                        Send to Webserv
                    </button>
                </form>
            </div>

            <div class="bg-gray-800 p-6 rounded-xl shadow-md border border-gray-700 text-gray-100 flex flex-col">
                <h2 class="text-xl font-semibold mb-4 border-b border-gray-600 pb-2 text-green-400">Request Payload Preview</h2>
                <p class="text-xs text-gray-400 mb-4">This is a rough approximation of what your webserv's <code class="bg-gray-700 px-1 rounded">recv()</code> will see when you hit submit.</p>
                
                <div class="bg-gray-900 rounded-md p-4 flex-grow overflow-y-auto font-mono text-sm shadow-inner relative">
                    <pre id="payloadPreview" class="code-block text-green-300">Select files to generate preview...</pre>
                </div>
            </div>
        </div>

    </div>

    <script>
        const form = document.getElementById('uploadForm');
        const preview = document.getElementById('payloadPreview');

        // Function to simulate how the multipart payload will look
        function updatePreview() {
            const formData = new FormData(form);
            const boundary = "----WebKitFormBoundaryRandomString12345";
            let payloadText = `POST /upload HTTP/1.1\r\n`;
            payloadText += `Host: localhost:8080\r\n`;
            payloadText += `Content-Type: multipart/form-data; boundary=${boundary}\r\n`;
            payloadText += `Content-Length: [Calculated by browser]\r\n\r\n`;

            let hasData = false;

            for (const [name, value] of formData.entries()) {
                hasData = true;
                payloadText += `--${boundary}\r\n`;
                
                if (value instanceof File && value.name !== "") {
                    payloadText += `Content-Disposition: form-data; name="${name}"; filename="${value.name}"\r\n`;
                    payloadText += `Content-Type: ${value.type || 'application/octet-stream'}\r\n\r\n`;
                    payloadText += `[ ... RAW BINARY DATA OF ${value.name} ... ]\r\n`;
                } else if (!(value instanceof File)) {
                    payloadText += `Content-Disposition: form-data; name="${name}"\r\n\r\n`;
                    payloadText += `${value}\r\n`;
                } else {
                     // Empty file input
                     payloadText += `Content-Disposition: form-data; name="${name}"; filename=""\r\n`;
                     payloadText += `Content-Type: application/octet-stream\r\n\r\n\r\n`;
                }
            }

            if (hasData) {
                payloadText += `--${boundary}--\r\n`;
                preview.textContent = payloadText;
            } else {
                preview.textContent = "Fill out the form to see the payload preview...";
            }
        }

        // Listen for changes on all inputs
        form.addEventListener('input', updatePreview);
        form.addEventListener('change', updatePreview);
        
        // Initial preview generation
        updatePreview();
        
        // Note: We don't preventDefault() on submit because we actually want it to send to your C++ server!
    </script>
</body>
</html>
