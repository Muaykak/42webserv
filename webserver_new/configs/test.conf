server {
	listen 4343;
	root wwwroot/www;

	host localhost;
	client_max_body_size 1000m;

	location / {
		index index.html;
		cgi_pass .php /usr/bin/php-cgi;
		allowed_methods GET POST;
	}

	location /upload
	{
		upload_store wwwroot/www/uploads;
		allowed_methods GET POST;
		autoindex on;
	}

	location /test/ {
		return 301 /;
	}
}